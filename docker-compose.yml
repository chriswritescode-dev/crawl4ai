# Shared configuration for all environments
x-base-config: &base-config
  ports:
    - "11235:11235"  # Gunicorn port
  env_file:
    - .llm.env       # API keys (create from .llm.env.example)
  # Persistent Chrome profile (logged-in cookies/session) shared between the
  # headless crawler and the one-time login sidecar. Host dir must be writable
  # by the container user (uid 999).
  volumes:
    - ${CRAWL4AI_PROFILE_DIR:-${HOME}/.crawl4ai/profiles/google-auth}:/profiles/google-auth
  # Uncomment to set default environment variables (will overwrite .llm.env)
  # environment:
  #   - OPENAI_API_KEY=${OPENAI_API_KEY:-}
  #   - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
  #   - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
  #   - GROQ_API_KEY=${GROQ_API_KEY:-}
  #   - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
  #   - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
  #   - GEMINI_API_KEY=${GEMINI_API_KEY:-}
  #   - LLM_PROVIDER=${LLM_PROVIDER:-}  # Optional: Override default provider (e.g., "anthropic/claude-3-opus")
  # Chromium needs shared memory but the host /dev/shm bind was a shared,
  # writable mount; use a private sized tmpfs instead.
  shm_size: "1gb"
  # Least privilege: drop all capabilities, forbid privilege escalation, cap PIDs.
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  # Read-only root filesystem; only these paths are writable (tmpfs).
  read_only: true
  tmpfs:
    - /tmp
    # All appuser-owned tmpfs mounts pin uid/gid 999: a bare tmpfs defaults to
    # root ownership and is remounted fresh on `docker compose restart`, so
    # without this the non-root process gets EACCES after a restart.
    - /var/lib/redis:uid=999,gid=999
    # Artifact store for screenshot/PDF/MHTML output.
    - /var/lib/crawl4ai/outputs:mode=0700,uid=999,gid=999
    - /home/appuser/.cache:uid=999,gid=999
    # crawl4ai writes runtime cache/logs to ~/.crawl4ai and gunicorn writes its
    # control socket/temp to ~/.gunicorn; both need to be writable under the
    # read_only rootfs.
    - /home/appuser/.crawl4ai:uid=999,gid=999
    - /home/appuser/.gunicorn:uid=999,gid=999
    # Chromium writes its profile/state under ~/.config (and ~/.local, ~/.pki);
    # without these tmpfs mounts it crashes on launch (crashpad socket reset /
    # TargetClosedError) under the read_only rootfs.
    - /home/appuser/.config:uid=999,gid=999
    - /home/appuser/.local:uid=999,gid=999
    - /home/appuser/.pki:uid=999,gid=999
  deploy:
    resources:
      limits:
        memory: 4G
        pids: 512
      reservations:
        memory: 1G
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s
  user: "appuser"

services:
  crawl4ai:
    # 1. Default: Pull multi-platform test image from Docker Hub
    # 2. Override with local image via: IMAGE=local-test docker compose up
    image: ${IMAGE:-unclecode/crawl4ai:${TAG:-latest}}
    
    # Local build config (used with --build)
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_TYPE: ${INSTALL_TYPE:-default}
        ENABLE_GPU: ${ENABLE_GPU:-false}
    
    # Inherit shared config
    <<: *base-config

  # Optional headed-browser-over-noVNC service. Not started by default; bring it
  # up only when you need to interact with a real browser remotely (e.g. a
  # one-time login to populate the shared profile):
  #   IMAGE=crawl4ai:local docker compose --profile vnc up -d browser-vnc
  # then open http://<host>:6080/vnc.html, log in, and stop it again.
  browser-vnc:
    profiles: ["vnc"]
    image: ${IMAGE:-unclecode/crawl4ai:${TAG:-latest}}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_TYPE: ${INSTALL_TYPE:-default}
        ENABLE_GPU: ${ENABLE_GPU:-false}
    entrypoint: ["/app/browser_vnc.sh"]
    user: "appuser"
    shm_size: "1gb"
    security_opt:
      - no-new-privileges:true
    ports:
      - "6080:6080"   # noVNC web UI
    environment:
      - PROFILE_DIR=/profiles/google-auth
      - START_URL=${VNC_START_URL:-https://accounts.google.com}
    volumes:
      - ${CRAWL4AI_PROFILE_DIR:-${HOME}/.crawl4ai/profiles/google-auth}:/profiles/google-auth
    tmpfs:
      - /tmp
      - /home/appuser/.cache:uid=999,gid=999
      - /home/appuser/.config:uid=999,gid=999
      - /home/appuser/.local:uid=999,gid=999
      - /home/appuser/.pki:uid=999,gid=999
    restart: "no"